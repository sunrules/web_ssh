<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web SSH Client</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <div id="login-form" class="login-form">
            <h2>SSH Connection</h2>
            <form id="ssh-form">
                <input type="text" id="host" placeholder="Host (e.g., localhost)" required>
                <input type="number" id="port" placeholder="Port" value="22" required>
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Connect</button>
            </form>
        </div>
        
        <div id="terminal-container" style="display:none;">
            <div class="terminal-header">
                <span id="connection-info"></span>
                <button id="disconnect-btn">Disconnect</button>
            </div>
            <div id="terminal"></div>
            <div class="clipboard-notification" id="clipboard-notification">
                Copied to clipboard!
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="/script.js"></script>
</body>
</html>
